<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Documentación de Laboratorios AWS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">

  <style>
    :root {
      /* Rosa fuerte */
      --theme-color: #ff2a85; 
    }
    
    /* Color para los títulos principales (h1) y subtítulos (h2, h3) */
    .content h1, .content h2, .content h3 {
      color: #ff2a85 !important;
      font-family: 'Courier New', Courier, monospace; /* Tipografía estilo código */
    }

    /* Color del nombre del proyecto en la barra lateral */
    .sidebar .app-name {
      color: #ffb6c1 !important;
    }

    /* Estilo para resaltar los bloques de código */
    code {
      color: #ff69b4 !important;
    }
  </style>
</head>
<body>
  <div id="app">Cargando bitácora...</div>
  <script>
    window.$docsify = {
      name: 'Bootcamp Labs',
      repo: 'https://github.com/ximenaasantiagoo/laboratorios-aws', 
      loadSidebar: true, 
      coverpage: false,
      homepage: 'README.md',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
