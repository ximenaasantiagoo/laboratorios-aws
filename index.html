<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bitácora de Laboratorios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">

  <style>
    :root {
      /* Rosa Fucsia */
      --theme-color: #ff2a85; 
    }
    body, .content, .sidebar {
      background-color: #121214 !important; 
    }
    .content h1, .content h2, .content h3 {
      color: #ff2a85 !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
    }
    .sidebar .app-name {
      color: #ff2a85 !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: bold;
    }
    .sidebar ul li a {
      color: #ff2a85 !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .sidebar ul li.active > a, .sidebar ul li a:hover {
      color: #ffdbed !important; 
      text-decoration: underline;
    }
    code {
      color: #ffb6c1 !important;
    }
  </style>
</head>
<body>
  <div id="app">Cargando bitácora...</div>
  <script>
    window.$docsify = {
      name: 'Bootcamp Labs',
      repo: 'https://github.com/ximenaasantiagoo/laboratorios-aws', 
      loadSidebar: true, 
      coverpage: false,
      homepage: 'README.md',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
