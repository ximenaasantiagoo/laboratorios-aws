<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Documentación de Laboratorios AWS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">

  <style>
    :root {
      --theme-color: #ff2a85; 
    }
    body, .content {
      background-color: #0d0d0f !important; 
    }
    .sidebar {
      background-color: #141416 !important;
      border-right: 1px solid #202024 !important;
    }
    .content h1, .content h2, .content h3 {
      color: #ff2a85 !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .sidebar .app-name {
      color: #ff2a85 !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: bold;
    }
    .sidebar ul li a {
      color: #daf0f4 !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .sidebar ul li strong {
      color: #00cbd6 !important; 
    }
    .sidebar ul li.active > a, .sidebar ul li a:hover {
      color:#fbf2f2 !important; 
      text-decoration: underline;
    }
    code {
      color: #ffb6c1 !important; 
    }
    .content hr {
      border: none;
      background: rgba(255, 255, 255, 0.15) !important;
      height: 1px;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app">Cargando bitácora...</div>

  <script>
    window.$docsify = {
      name: 'AWS re/Start',
      repo: 'https://github.com/ximenaasantiagoo/laboratorios-aws', 
      loadSidebar: true, 
      coverpage: false,
      homepage: 'README.md'
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
